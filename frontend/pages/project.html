<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projektansicht</title>
    <link rel="stylesheet" href="../css/auth.css" />
    <link rel="stylesheet" href="../css/projects.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/pages/project.js"></script>
  </head>
  <body>
    <main class="projects-layout project-view-layout">
      <section class="panel project-meta-panel">
        <a class="back-link" href="./projects.html">← Zurück zu Projekten</a>
        <h1 data-project-title>Projekt</h1>
        <p class="subtitle" data-project-subtitle>Lade Projektdaten ...</p>
      </section>

      <section class="panel project-main-panel">
        <aside class="project-side-nav" aria-label="Projekt-Navigation">
          <button type="button" class="side-nav-item is-active" data-project-nav="dashboard">Dashboard</button>
          <button type="button" class="side-nav-item" data-project-nav="ablauf">Ablauf</button>
          <button type="button" class="side-nav-item" data-project-nav="team">Team</button>
        </aside>

        <div class="project-content">
          <section data-project-section="dashboard" class="project-section">
            <h2>Dashboard</h2>
            <p class="subtitle">Dashboard</p>
          </section>

          <section data-project-section="ablauf" class="project-section is-hidden" aria-live="polite">
            <div class="ablauf-head">
              <h2>Ablauf</h2>
              <div class="ablauf-actions">
                <button type="button" class="create-btn secondary" data-add-schedule-item aria-label="Ablauf-Eintrag hinzufügen">+ Ablauf</button>
                <button type="button" class="create-btn" data-add-resource-item aria-label="Ressourcen-Eintrag hinzufügen">+ Ressource</button>
              </div>
            </div>

            <p class="status-text" data-schedule-status></p>

            <div class="gantt-controls">
              <button type="button" class="secondary" data-gantt-prev>Vorherige 5 Wochen</button>
              <p class="subtitle" data-gantt-range></p>
              <button type="button" class="secondary" data-gantt-next>Nächste 5 Wochen</button>
            </div>

            <div class="gantt-wrap">
              <div class="gantt-grid" data-gantt-grid></div>
            </div>

            <dialog class="project-modal" data-schedule-dialog>
              <form class="schedule-form" data-schedule-form>
                <h3 data-schedule-dialog-title>Eintrag erstellen</h3>
                <label>
                  Titel
                  <input type="text" name="title" maxlength="120" required />
                </label>
                <label>
                  Startdatum
                  <input type="date" name="startDate" required />
                </label>
                <label>
                  Enddatum
                  <input type="date" name="endDate" required />
                </label>
                <label data-color-field>
                  Farbe
                  <select name="color" required>
                    <option value="#FDE2E4">Rose</option>
                    <option value="#F9E2AE">Apricot</option>
                    <option value="#FAEDCB">Vanille</option>
                    <option value="#D8F3DC">Mint</option>
                    <option value="#B7E4C7">Sage</option>
                    <option value="#CDEAC0">Pistazie</option>
                    <option value="#C9E4DE">Aqua</option>
                    <option value="#D6E2E9">Nebelblau</option>
                    <option value="#DCCEF9">Lavendel</option>
                    <option value="#F1D1D0">Pfirsichrosa</option>
                  </select>
                </label>
                <div class="resource-field is-hidden" data-resource-field>
                  <label for="resource-select-input">Ressource auswählen</label>
                  <div class="resource-picker">
                    <select id="resource-select-input" data-resource-select></select>
                    <button type="button" class="secondary" data-add-selected-resource>+ Person</button>
                  </div>
                  <div class="resource-selected" data-resource-selected></div>
                </div>
                <div class="modal-actions">
                  <button type="button" class="danger ghost is-hidden" data-remove-schedule-item>Eintrag entfernen</button>
                  <button type="button" class="secondary" data-cancel-schedule-item>Abbrechen</button>
                  <button type="submit" data-schedule-submit>Speichern</button>
                </div>
              </form>
            </dialog>
          </section>

          <section data-project-section="team" class="project-section is-hidden" aria-live="polite">
            <div class="ablauf-head">
              <h2>Team</h2>
              <button type="button" class="create-btn" data-add-team-member>+ Team</button>
            </div>
            <p class="status-text" data-team-status></p>
            <div class="table-wrap">
              <table class="projects-table">
                <thead>
                  <tr>
                    <th>Vorname</th>
                    <th>Nachname</th>
                    <th>Rolle</th>
                  </tr>
                </thead>
                <tbody data-team-table-body>
                  <tr><td colspan="3" class="table-empty">Noch keine Teammitglieder vorhanden.</td></tr>
                </tbody>
              </table>
            </div>
            <dialog class="project-modal" data-team-dialog>
              <form class="schedule-form" data-team-form>
                <h3>Teammitglied hinzufügen</h3>
                <label>
                  Name
                  <input type="text" name="firstName" maxlength="80" required />
                </label>
                <label>
                  Nachname
                  <input type="text" name="lastName" maxlength="80" required />
                </label>
                <label>
                  Einstellung
                  <select name="role" required>
                    <option value="Lehrling">Lehrling</option>
                    <option value="Monteur">Monteur</option>
                  </select>
                </label>
                <div class="modal-actions">
                  <button type="button" class="secondary" data-cancel-team-member>Abbrechen</button>
                  <button type="submit">Hinzufügen</button>
                </div>
              </form>
            </dialog>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
