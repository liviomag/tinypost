<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projekte</title>
    <link rel="stylesheet" href="../css/auth.css" />
    <link rel="stylesheet" href="../css/projects.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/pages/projects.js"></script>
  </head>
  <body>
    <main class="projects-layout">
      <header class="projects-header">
        <div>
          <h1>Projekte</h1>
          <p class="subtitle">Verwalte deine Projekte übersichtlich an einem Ort.</p>
        </div>
      </header>

      <section class="panel" aria-labelledby="project-create-title">
        <h2 id="project-create-title">Neues Projekt erfassen</h2>
        <form class="project-form" data-project-form>
          <label>
            Kommissionsnummer
            <input name="kommissionsnummer" type="text" maxlength="100" required />
          </label>
          <label>
            Projektname
            <input name="projektname" type="text" maxlength="200" required />
          </label>
          <button type="submit" data-submit-button>Projekt erfassen</button>
        </form>
        <p class="message" data-project-message aria-live="polite"></p>
      </section>

      <section class="panel" aria-labelledby="project-list-title">
        <h2 id="project-list-title">Deine Projekte</h2>
        <div class="table-wrap">
          <table class="projects-table">
            <thead>
              <tr>
                <th>Kommissionsnummer</th>
                <th>Projektname</th>
                <th>Erstellt am</th>
                <th>Aktionen</th>
              </tr>
            </thead>
            <tbody data-project-table-body></tbody>
          </table>
        </div>
        <p class="table-empty" data-project-empty hidden>Es sind noch keine Projekte vorhanden.</p>
      </section>
    </main>
  </body>
</html>
