<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrieren</title>
    <link rel="stylesheet" href="../css/auth.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/auth/register.js"></script>
  </head>
  <body>
    <main class="auth-card">
      <h1>Registrieren</h1>
      <form class="auth-form" data-auth-register-form>
        <label>E-Mail <input type="email" name="email" autocomplete="email" required /></label>
        <label>Vorname <input type="text" name="firstName" autocomplete="given-name" required /></label>
        <label>Nachname <input type="text" name="lastName" autocomplete="family-name" required /></label>
        <label>Passwort <input type="password" name="password" autocomplete="new-password" required /></label>
        <label>Passwort wiederholen <input type="password" name="passwordRepeat" autocomplete="new-password" required /></label>
        <button type="submit">Registrieren</button>
      </form>
      <p class="message" data-auth-message></p>
      <div class="auth-links">
        <a href="./login.html">Zurück zum Login</a>
      </div>
    </main>
  </body>
</html>
