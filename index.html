<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinyPost Auth</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="card" id="status-card" aria-live="polite">
        <h1 class="title">TinyPost Auth</h1>
        <p id="breadcrumb" class="subtitle">Login</p>

        <div id="alert" class="alert hidden" role="status"></div>

        <div id="loading" class="loading" aria-busy="true">Initialisiere Supabase…</div>

        <div id="auth-view" class="hidden">
          <div id="login-screen">
            <form id="auth-form" novalidate>
              <label for="email" class="label">E-Mail</label>
              <input id="email" name="email" type="email" class="input" autocomplete="email" required />

              <label for="password" class="label">Passwort</label>
              <input id="password" name="password" type="password" class="input" autocomplete="current-password" minlength="6" required />

              <div class="button-row">
                <button id="login-btn" type="submit" class="btn btn-primary">Login</button>
                <button id="register-btn" type="button" class="btn">Registrieren</button>
              </div>
            </form>
          </div>

          <div id="register-screen" class="hidden">
            <form id="register-form" novalidate>
              <label for="register-email" class="label">E-Mail</label>
              <input id="register-email" name="register-email" type="email" class="input" autocomplete="email" required />

              <label for="register-password" class="label">Passwort</label>
              <input id="register-password" name="register-password" type="password" class="input" autocomplete="new-password" minlength="6" required />

              <label for="register-password-repeat" class="label">Passwort wiederholen</label>
              <input id="register-password-repeat" name="register-password-repeat" type="password" class="input" autocomplete="new-password" minlength="6" required />

              <div class="button-row">
                <button id="register-submit-btn" type="submit" class="btn btn-primary">Registrieren</button>
                <button id="back-to-login-btn" type="button" class="btn">Zurück zum Login</button>
              </div>
            </form>
          </div>
        </div>

        <div id="dashboard-view" class="hidden">
          <h2>Dashboard</h2>
          <button id="logout-btn" type="button" class="btn btn-primary">Logout</button>
        </div>
      </section>
    </main>
  </body>
</html>
